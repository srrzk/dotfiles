monitor=,preferred,auto,1

$terminal = uwsm app -- footclient
$tmux=$terminal -e uwsm app -- tmux new-session -ADs default -c ~/dotfiles

$fileManager = uwsm app -- nautilus
$menu = fuzzel --launch-prefix='uwsm app --'
$browser = uwsm app -- chromium --hide-crash-restore-bubble --restore-last-session

exec-once = [workspace 1 silent] $tmux
exec-once = [workspace 2 silent] $browser

exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

general {
	gaps_out = 0
	gaps_in = 0
	border_size = 2
	col.active_border = rgba(98971aef) rgba(d79921ef) 45deg
	col.inactive_border = rgba(504945ee)
	resize_on_border = false
	allow_tearing = false
	layout = dwindle
}

decoration {
	rounding = 0
	rounding_power = 0
	active_opacity = 1.0
	inactive_opacity = 1.0

	shadow {
		enabled = false
	}
	blur {
		enabled = false
		size = 4
		passes = 2
	}
}

animations {
	enabled = true

	bezier = easeInOut, 0.42, 0.0, 0.58, 1.0
	bezier = pop, 0.3, 0.1, 0.7, 1.05
	bezier = slide, 0.25, 0.0, 0.75, 1.0
	bezier = fade, 0.5, 0.2, 0.5, 1.0

	animation = global, 1, 2, default
	animation = windowsIn, 1, 1.8, slide, gnomed
	animation = windowsOut, 1, 1, slide, gnomed
	animation = windowsMove, 1, 1.6, slide, gnomed
	animation = layers, 1, 1.5, pop, popin 80%
	animation = fade, 1, 1.8, fade
	animation = fadeIn, 1, 1.8, fade
	animation = fadeOut, 1, 1, fade
	animation = workspaces, 1, 1.8, easeInOut, slidevert
	animation = specialWorkspace, 1, 2, easeInOut, slide
}

dwindle {
	pseudotile = true
	preserve_split = true
}


misc {
	force_default_wallpaper = 0
	disable_hyprland_logo = true
	font_family = monospace
	splash_font_family = monospace
	background_color = 0x00000000
	initial_workspace_tracking = false
	vfr = true
}

binds {

}

cursor {
	no_warps = false
	persistent_warps = true
	warp_on_change_workspace = true
}

ecosystem {
	no_donation_nag = true
}


input {
	kb_layout = us,ru
	kb_variant =
	kb_model =
	kb_rules =
	kb_options=grp:win_space_toggle
	repeat_rate = 30
	repeat_delay = 200

	follow_mouse = 1

	sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

	touchpad {
		natural_scroll = true
	}
}

gestures {
	workspace_swipe = false
}

bind = SUPER, Q, exec, $terminal
bind = SUPER, RETURN, exec, $tmux
bind = SUPER, C, killactive,
bind = SUPER, M, execr, loginctl terminate-user ""
bind = SUPER, E, exec, $fileManager
bind = ALT, SPACE, togglefloating,
bind = SUPER, D, exec, $menu
bind = SUPER, P, pseudo,
bind = SUPER, S, togglesplit,
bind = SUPER, F, fullscreenstate, 2 0
bind = SUPER, Z, fullscreenstate, 1 0
bind = SUPER ALT, D, execr, /home/srrzk/scripts/dark
bind = SUPER ALT, L, execr, /home/srrzk/scripts/light

# dmenus
bind = super, v, exec, cliphist list | fuzzel --dmenu --lines=15 --width=90 | cliphist decode | wl-copy
bind = super, s, exec, ssession=$(sesh l -t | fuzzel --dmenu -p "sesh sessions"); sesh cn --switch $ssession && hyprctl dispatch focusworkspaceoncurrentmonitor 1

bind = SUPER SHIFT, PRINT, exec, hyprshot -m region
bind = , PRINT, exec, hyprshot -m output

bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

bind = SUPER SHIFT, h, movewindow, l
bind = SUPER SHIFT, l, movewindow, r
bind = SUPER SHIFT, k, movewindow, u
bind = SUPER SHIFT, j, movewindow, d

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, Control_L, movewindow
bindm = SUPER, mouse:273, resizewindow
bindm = SUPER, ALT_L, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

windowrule = suppressevent maximize, class:.*

windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

windowrule = float,class:org.telegram.desktop,title:Media viewer
windowrule = size 75%,class:org.telegram.desktop,title:Media viewer
windowrule = fullscreenstate 0 0,class:org.telegram.desktop,title:Media viewer
windowrule = center,class:org.telegram.desktop,title:Media viewer
